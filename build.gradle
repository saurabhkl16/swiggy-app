plugins {
    id 'java'
    id 'application'
}

group = 'com.app'
version = '1.0-SNAPSHOT'

sourceCompatibility = '21'
targetCompatibility = '21'

repositories {
    mavenCentral()
}

dependencies {
    implementation 'com.mysql:mysql-connector-j:8.0.33'
    implementation 'org.json:json:20230227'
}

application {
    mainClass = 'com.app.Main'
}